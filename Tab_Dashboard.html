<!-- TAB: DASHBOARD -->
<div
  x-show="currentTab === 'dashboard'"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 translate-x-4"
  x-transition:enter-end="opacity-100 translate-x-0"
  x-init="$watch('currentTab', (val) => { if (val === 'dashboard') $nextTick(() => appApp.renderDashboardCharts()); })"
  class="space-y-6"
>
  <!-- Filter Section -->
  <div class="bento-card p-4 bg-white flex flex-col gap-4">
    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
      <button
        @click="setQuickFilter('day')"
        class="flex-shrink-0 px-4 py-2 text-xs font-bold rounded-xl bg-gray-100 hover:bg-[#FAD4C0] transition-colors"
      >
        Hari Ini
      </button>
      <button
        @click="setQuickFilter('week')"
        class="flex-shrink-0 px-4 py-2 text-xs font-bold rounded-xl bg-gray-100 hover:bg-[#FAD4C0] transition-colors"
      >
        7 Hari
      </button>
      <button
        @click="setQuickFilter('month')"
        class="flex-shrink-0 px-4 py-2 text-xs font-bold rounded-xl bg-gray-100 hover:bg-[#FAD4C0] transition-colors"
      >
        30 Hari
      </button>
      <button
        @click="resetFilters"
        class="flex-shrink-0 px-4 py-2 text-xs font-medium text-gray-400 hover:text-gray-600 transition-colors"
      >
        Reset
      </button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 items-end">
      <!-- Date Range -->
      <div class="flex items-center gap-2">
        <div class="flex-1">
          <label
            class="block text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest"
            >Dari</label
          >
          <input
            type="date"
            x-model="filters.startDate"
            @change="fetchSummary"
            class="w-full px-3 py-2 border border-gray-100 rounded-xl text-sm focus:ring-2 focus:ring-[#FAD4C0] outline-none"
          />
        </div>
        <div class="flex-1">
          <label
            class="block text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest"
            >Sampai</label
          >
          <input
            type="date"
            x-model="filters.endDate"
            @change="fetchSummary"
            class="w-full px-3 py-2 border border-gray-100 rounded-xl text-sm focus:ring-2 focus:ring-[#FAD4C0] outline-none"
          />
        </div>
      </div>

      <!-- Class Filter -->
      <div>
        <label
          class="block text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest"
          >Kelas</label
        >
        <select
          x-model="filters.classFilter"
          @change="fetchSummary"
          class="w-full px-3 py-2 border border-gray-100 rounded-xl text-sm focus:ring-2 focus:ring-[#FAD4C0] outline-none bg-white"
        >
          <option value="">Semua Kelas</option>
          <template x-for="cls in uniqueClasses" :key="cls">
            <option :value="cls" x-text="cls"></option>
          </template>
        </select>
      </div>

      <!-- Memo Category Filter -->
      <div>
        <label
          class="block text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest"
          >Kategori Hafalan</label
        >
        <select
          x-model="filters.memoCategory"
          @change="fetchSummary"
          class="w-full px-3 py-2 border border-gray-100 rounded-xl text-sm focus:ring-2 focus:ring-[#FAD4C0] outline-none bg-white"
        >
          <option value="">Semua</option>
          <option value="Iqro">Iqro</option>
          <option value="Al-Quran">Al-Quran</option>
          <option value="Hafalan">Hafalan</option>
        </select>
      </div>

      <!-- Incident Type Filter -->
      <div>
        <label
          class="block text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest"
          >Jenis Perilaku</label
        >
        <select
          x-model="filters.incidentType"
          @change="fetchSummary"
          class="w-full px-3 py-2 border border-gray-100 rounded-xl text-sm focus:ring-2 focus:ring-[#FAD4C0] outline-none bg-white"
        >
          <option value="">Semua</option>
          <option value="Violation">Pelanggaran</option>
          <option value="Achievement">Prestasi</option>
        </select>
      </div>
    </div>
  </div>

  <!-- SKELETON LOADING STATE -->
  <div
    x-show="loading"
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"
  >
    <template x-for="i in 3">
      <div class="bento-card p-6 bg-white h-32 rounded-2xl">
        <div
          class="animate-pulse flex flex-col items-center justify-center h-full space-y-3"
        >
          <div class="h-3 bg-gray-200 rounded w-1/2"></div>
          <div class="h-8 bg-gray-200 rounded w-1/3"></div>
        </div>
      </div>
    </template>
  </div>

  <!-- CONTENT: STATS GRID -->
  <div
    x-show="!loading"
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"
  >
    <!-- Total Santri Card -->
    <div
      @click="currentTab = 'santri'"
      class="card card-hover p-6 cursor-pointer group"
    >
      <div class="flex items-center justify-between mb-4">
        <div class="stat-icon primary">
          <span>👥</span>
        </div>
        <div class="stat-badge"><span>📊</span> Total</div>
      </div>
      <div
        class="stat-value gradient-text"
        x-text="summary.totalStudents || 0"
      ></div>
      <div class="stat-label mt-2">Total Santri</div>
      <div class="mt-4 mini-progress">
        <div class="mini-progress-fill" style="width: 100%"></div>
      </div>
    </div>

    <!-- Setoran Hafalan Card -->
    <div
      @click="currentTab = 'hafalan'"
      class="card card-hover p-6 cursor-pointer group"
    >
      <div class="flex items-center justify-between mb-4">
        <div class="stat-icon success">
          <span>📖</span>
        </div>
        <div class="stat-badge"><span>✓</span> Aktif</div>
      </div>
      <div
        class="stat-value text-green-600"
        x-text="summary.totalLogs || 0"
      ></div>
      <div class="stat-label mt-2">Setoran Hafalan</div>
      <div class="mt-4 mini-progress">
        <div class="mini-progress-fill" style="width: 85%"></div>
      </div>
    </div>

    <!-- Catatan Perilaku Card -->
    <div
      @click="currentTab = 'list_perilaku'"
      class="card card-hover p-6 cursor-pointer group"
    >
      <div class="flex items-center justify-between mb-4">
        <div class="stat-icon warning">
          <span>📋</span>
        </div>
        <div class="stat-badge warning"><span>⚡</span> Update</div>
      </div>
      <div
        class="stat-value text-orange-500"
        x-text="summary.totalIncidents || 0"
      ></div>
      <div class="stat-label mt-2">Catatan Perilaku</div>
      <div class="mt-4 mini-progress">
        <div class="mini-progress-fill" style="width: 70%"></div>
      </div>
    </div>
  </div>

  <!-- CONTENT: DASHBOARD CHARTS -->
  <div x-show="!loading" class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
    <!-- Memo Chart Card -->
    <div class="chart-card">
      <div class="chart-header">
        <h3 class="chart-title">Tren Setoran Hafalan</h3>
        <span class="chart-period">30 Hari Terakhir</span>
      </div>
      <div
        id="memoChartContainer"
        class="relative"
        style="height: 256px; width: 100%"
      >
        <canvas id="memoChart"></canvas>
      </div>
    </div>

    <!-- Behavior Score Chart Card -->
    <div class="chart-card">
      <h3 class="font-bold mb-4 flex items-center gap-2">
        <span class="w-2 h-2 bg-orange-500 rounded-full"></span> Tren Skor
        Perilaku (30 Hari)
      </h3>
      <div
        id="behaviorChartContainer"
        class="relative"
        style="height: 256px; width: 100%"
      >
        <canvas id="behaviorChart"></canvas>
      </div>
    </div>
  </div>

  <!-- CONTENT: ATTENTION STUDENTS -->
  <div
    x-show="!loading && summary.attentionStudents && summary.attentionStudents.length > 0"
    class="bento-card p-6 bg-red-50 border-2 border-red-100"
  >
    <h3 class="font-bold text-red-700 mb-4 flex items-center gap-2">
      <span class="animate-pulse">🔥</span> Perhatian Khusus
    </h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <template x-for="item in summary.attentionStudents" :key="item.id">
        <div
          @click="openStudentDetail(students.find(s => s.StudentID === item.id))"
          class="bg-white p-4 rounded-2xl shadow-sm border border-red-50 cursor-pointer hover:shadow-md transition-all"
        >
          <p class="font-bold text-gray-800" x-text="item.name"></p>
          <div class="mt-2 space-y-1">
            <template x-for="reason in item.reasons">
              <p
                class="text-xs font-medium text-red-500 flex items-center gap-1"
              >
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                  <path
                    fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd"
                  ></path>
                </svg>
                <span x-text="reason"></span>
              </p>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- CONTENT: RECENT ACTIVITY -->
  <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Recent Hafalan -->
    <div class="bento-card p-6 bg-white">
      <h3 class="font-bold mb-4 flex items-center gap-2">
        <span class="w-2 h-2 bg-green-500 rounded-full"></span> Hafalan Terbaru
      </h3>
      <div class="space-y-3">
        <template x-for="log in summary.recentLogs">
          <div
            class="flex justify-between items-center p-3 bg-gray-50 rounded-xl"
          >
            <div>
              <p class="font-medium" x-text="log.Surah"></p>
              <div class="flex gap-2 items-center">
                <p
                  class="text-[10px] font-bold text-[#80A1C1]"
                  x-text="log.Category"
                ></p>
                <p
                  class="text-[10px] text-gray-400"
                  x-text="formatDate(log.DateLogged)"
                ></p>
              </div>
            </div>
            <span
              class="px-2 py-1 text-xs rounded-lg bg-green-100 text-green-700"
              x-text="log.Status"
            ></span>
          </div>
        </template>
      </div>
    </div>
    <!-- Recent Incidents -->
    <div class="bento-card p-6 bg-white">
      <h3 class="font-bold mb-4 flex items-center gap-2">
        <span class="w-2 h-2 bg-red-500 rounded-full"></span> Catatan Perilaku
      </h3>
      <div class="space-y-3">
        <template x-if="summary.recentIncidents.length === 0">
          <p class="text-sm text-gray-400 italic">Belum ada catatan perilaku</p>
        </template>
        <template
          x-for="inc in summary.recentIncidents.slice(0, 5)"
          :key="inc.IncidentID"
        >
          <div
            class="p-3 bg-gray-50 rounded-xl hover:bg-red-50 transition-colors border-l-4"
            :class="inc.IncidentType === 'Violation' ? 'border-red-400' : 'border-green-400'"
          >
            <div class="flex justify-between items-start">
              <div class="flex-1">
                <div class="flex justify-between items-center mb-1">
                  <p
                    class="font-bold text-sm text-gray-800 cursor-pointer hover:text-blue-600"
                    @click="openStudentDetail(students.find(s => s.StudentID === inc.StudentID))"
                    x-text="inc.StudentName"
                  ></p>
                  <span
                    class="text-[10px] font-bold px-2 py-1 rounded"
                    :class="inc.Points >= 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                    x-text="inc.IncidentType"
                  ></span>
                </div>
                <p
                  class="text-xs text-gray-600 mt-1"
                  x-text="inc.Description"
                ></p>
                <div class="flex justify-between items-center mt-2">
                  <p
                    class="text-[10px] text-gray-400"
                    x-text="formatDate(inc.DateOfIncident) + ' • ' + inc.Points + ' Poin • Ustadz: ' + inc.ReportedBy"
                  ></p>
                  <!-- Edit & Delete Buttons (only for Mudir/Ustadz) -->
                  <template
                    x-if="user?.Role === 'Mudir' || user?.Role === 'Ustadz'"
                  >
                    <div class="flex gap-2">
                      <button
                        @click.stop="editPerilaku(inc); currentTab = 'pelanggaran'"
                        class="text-[10px] text-blue-500 font-bold hover:underline"
                      >
                        Edit
                      </button>
                      <button
                        @click.stop="deletePerilaku(inc.IncidentID)"
                        class="text-[10px] text-red-500 font-bold hover:underline"
                      >
                        Hapus
                      </button>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
