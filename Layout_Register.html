<!-- Layout Register -->
<!-- REGISTER -->
<div
  x-show="!isLoggedIn && showRegister"
  class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow"
  x-cloak
>
  <h1 class="text-2xl font-bold mb-1 text-center">Daftar Wali Santri</h1>
  <p class="text-xs text-center text-gray-500 mb-6 italic">
    Halaman ini khusus untuk wali santri.
  </p>

  <form @submit.prevent="handleRegister">
    <input
      type="text"
      x-model="registerForm.username"
      placeholder="Username"
      class="w-full mb-2 p-2 border rounded"
    />
    <input
      type="password"
      x-model="registerForm.password"
      placeholder="Password (min 6 karakter)"
      class="w-full mb-2 p-2 border rounded"
    />
    <input
      type="password"
      x-model="registerForm.confirmPassword"
      placeholder="Konfirmasi Password"
      class="w-full mb-4 p-2 border rounded"
    />

    <button class="w-full bg-green-500 text-white p-2 rounded">
      Daftar Sekarang
    </button>

    <p x-text="registerError" class="text-red-500 text-sm mt-2"></p>
    <button
      type="button"
      @click="showRegister = false"
      class="w-full mt-2 text-sm text-gray-500 underline"
    >
      Kembali ke Login
    </button>
  </form>
</div>
