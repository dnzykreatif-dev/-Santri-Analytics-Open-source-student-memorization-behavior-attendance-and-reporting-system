<!-- Tab Perilaku Input -->
<!-- TAB: INPUT PELANGGARAN -->
<div
  x-show="currentTab === 'pelanggaran'"
  x-transition:enter="transition ease-out duration-300"
  class="space-y-6"
>
  <div class="bento-card p-6 bg-white">
    <div
      class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-4 text-xs text-yellow-800 italic"
    >
      Maksimal 2 prestasi per hari. Jika ada pelanggaran hari ini → hanya boleh
      1 prestasi.
    </div>
    <h3 class="font-bold text-xl mb-6 text-red-400">Input Catatan Perilaku</h3>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1"
            >Pilih Santri</label
          >
          <select
            x-model="incidentForm.StudentID"
            class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-[#FAD4C0] outline-none bg-white text-base"
          >
            <option value="">-- Pilih Santri --</option>
            <template x-for="s in students" :key="s.StudentID">
              <option :value="s.StudentID" x-text="s.Name"></option>
            </template>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1"
              >Jenis</label
            >
            <select
              x-model="incidentForm.IncidentType"
              class="w-full px-4 py-3 border rounded-xl bg-white text-base"
            >
              <option value="Violation">Pelanggaran</option>
              <option value="Improvement">Prestasi/Perubahan</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1"
              >Poin</label
            >
            <input
              type="number"
              x-model="incidentForm.Points"
              class="w-full px-4 py-3 border rounded-xl text-base"
            />
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1"
            >Keterangan</label
          >
          <textarea
            x-model="incidentForm.Description"
            class="w-full px-4 py-3 border rounded-xl text-base"
            rows="3"
          ></textarea>
        </div>

        <!-- Quick Buttons -->
        <div class="space-y-4">
          <template x-for="cat in incidentCategories" :key="cat.label">
            <div>
              <p
                class="text-[10px] font-bold text-gray-400 uppercase mb-2"
                x-text="cat.label"
              ></p>
              <div class="grid grid-cols-2 gap-2">
                <template x-for="item in cat.items" :key="item.desc">
                  <button
                    @click="applyQuickIncident(item)"
                    :class="cat.color"
                    class="py-2 px-2 rounded-lg text-[10px] font-bold text-center hover:opacity-80 transition-all"
                  >
                    <span x-text="item.desc"></span> (<span
                      x-text="item.pts"
                    ></span
                    >)
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>

        <div class="pt-4 border-t mt-4">
          <button
            @click="submitIncidentGlobal"
            class="w-full py-3 bg-gray-800 text-white rounded-xl font-bold text-sm shadow-sm active:scale-95"
          >
            Simpan Catatan Manual
          </button>
        </div>
      </div>
      <div class="bg-gray-50 rounded-2xl p-6">
        <h4 class="text-sm font-bold text-gray-400 mb-4 uppercase">
          Evaluasi Perilaku Terbaru
        </h4>
        <div class="space-y-3">
          <template
            x-for="inc in summary.recentIncidents"
            :key="inc.IncidentID"
          >
            <div
              class="bg-white p-4 rounded-xl shadow-sm text-sm border-l-4"
              :class="inc.IncidentType === 'Violation' ? 'border-red-400' : 'border-green-400'"
            >
              <div class="flex justify-between items-start">
                <div class="flex-1">
                  <div class="flex justify-between items-center mb-1">
                    <p
                      class="font-bold text-gray-800"
                      x-text="inc.StudentName"
                    ></p>
                    <span
                      class="text-[10px] font-bold px-2 py-1 rounded"
                      :class="inc.Points >= 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                      x-text="inc.IncidentType"
                    ></span>
                  </div>
                  <p
                    class="text-gray-500 text-xs mt-1"
                    x-text="inc.Description"
                  ></p>
                  <div class="flex justify-between items-center mt-2">
                    <span
                      class="text-[10px] text-gray-400"
                      x-text="formatDate(inc.DateOfIncident) + ' • ' + inc.Points + ' Poin'"
                    ></span>
                    <!-- Edit & Delete Buttons (only for Mudir/Ustadz) -->
                    <template
                      x-if="user?.Role === 'Mudir' || user?.Role === 'Ustadz'"
                    >
                      <div class="flex gap-2">
                        <button
                          @click="editPerilaku(inc)"
                          class="text-[10px] text-blue-500 font-bold hover:underline"
                        >
                          Edit
                        </button>
                        <button
                          @click="deletePerilaku(inc.IncidentID)"
                          class="text-[10px] text-red-500 font-bold hover:underline"
                        >
                          Hapus
                        </button>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</div>
