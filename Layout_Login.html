<!-- Layout Login -->
<!-- LOGIN -->
<div
  x-show="!isLoggedIn && !showRegister"
  class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow"
  x-cloak
>
  <h1 class="text-2xl font-bold mb-4 text-center">Login</h1>

  <form @submit.prevent="handleLogin">
    <input
      type="text"
      x-model="loginForm.username"
      placeholder="Username / No HP"
      class="w-full mb-2 p-2 border rounded"
    />
    <input
      type="password"
      x-model="loginForm.password"
      placeholder="Password"
      class="w-full mb-4 p-2 border rounded"
    />

    <button class="w-full bg-blue-500 text-white p-2 rounded">Masuk</button>
    <p class="text-xs text-gray-400 mt-4 text-center">
      Wali: Gunakan No HP terdaftar dan password 123456
    </p>

    <p x-text="error" class="text-red-500 text-sm mt-2"></p>
  </form>
</div>
