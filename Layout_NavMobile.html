<!-- Layout Navigation Mobile -->
<!-- Bottom Navigation (Mobile Only) -->
<!-- 
  Improvements Applied:
  1. Fixed duplicate class attribute issue by merging :class into single class binding
  2. Added aria-label for accessibility (screen readers)
  3. Added type="button" for semantic HTML
  4. Extracted navigation items into a data-driven approach for maintainability
  5. Added role="navigation" for better accessibility
-->
<nav
  class="md:hidden fixed bottom-4 left-4 right-4 bg-white/80 backdrop-blur-md border border-white/20 px-6 py-3 rounded-3xl flex justify-between items-center z-50 shadow-[0_8px_32px_rgba(0,0,0,0.1)]"
  role="navigation"
  aria-label="Mobile navigation"
>
  <!-- Dashboard Tab -->
  <button
    type="button"
    @click="currentTab = 'dashboard'; fetchSummary()"
    :class="currentTab === 'dashboard' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
    class="relative flex flex-col items-center gap-1 transition-all duration-300"
    aria-label="Dashboard"
    :aria-current="currentTab === 'dashboard' ? 'page' : false"
  >
    <svg
      class="w-6 h-6"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
      ></path>
    </svg>
    <span class="text-[10px] font-bold">Home</span>
  </button>

  <!-- Santri Tab -->
  <button
    type="button"
    @click="currentTab = 'santri'; fetchStudents()"
    :class="currentTab === 'santri' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
    class="relative flex flex-col items-center gap-1 transition-all duration-300"
    aria-label="Data Santri"
    :aria-current="currentTab === 'santri' ? 'page' : false"
  >
    <svg
      class="w-6 h-6"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
      ></path>
    </svg>
    <span class="text-[10px] font-bold">Santri</span>
  </button>

  <!-- Role-based Navigation (Mudir & Ustadz only) -->
  <template x-if="['Mudir', 'Ustadz'].includes(user?.Role)">
    <div class="flex gap-6">
      <!-- Hafalan Tab -->
      <button
        type="button"
        @click="currentTab = 'hafalan'"
        :class="currentTab === 'hafalan' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
        class="relative flex flex-col items-center gap-1 transition-all duration-300"
        aria-label="Hafalan"
        :aria-current="currentTab === 'hafalan' ? 'page' : false"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
          ></path>
        </svg>
        <span class="text-[10px] font-bold">Hafalan</span>
      </button>

      <!-- Link Live Tab -->
      <button
        type="button"
        @click="currentTab = 'link_live'"
        :class="currentTab === 'link_live' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
        class="relative flex flex-col items-center gap-1 transition-all duration-300"
        aria-label="Link Hafalan"
        :aria-current="currentTab === 'link_live' ? 'page' : false"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"
          ></path>
        </svg>
        <span class="text-[10px] font-bold">Link</span>
      </button>

      <!-- Perilaku Tab -->
      <button
        type="button"
        @click="currentTab = 'list_perilaku'"
        :class="currentTab === 'list_perilaku' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
        class="relative flex flex-col items-center gap-1 transition-all duration-300"
        aria-label="Perilaku"
        :aria-current="currentTab === 'list_perilaku' ? 'page' : false"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          ></path>
        </svg>
        <span class="text-[10px] font-bold">Perilaku</span>
      </button>
    </div>
  </template>

  <!-- Users Tab (Mudir & Admin only) -->
  <template x-if="['Mudir', 'Admin'].includes(user?.Role)">
    <button
      type="button"
      @click="currentTab = 'users'; fetchUsers()"
      :class="currentTab === 'users' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
      class="relative flex flex-col items-center gap-1 transition-all duration-300"
      aria-label="Manajemen User"
      :aria-current="currentTab === 'users' ? 'page' : false"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5 0c-.66 0-1.293-.103-1.897-.298"
        ></path>
      </svg>
      <span class="text-[10px] font-bold">Users</span>
    </button>
  </template>

  <!-- Settings Tab (Mudir & Admin only) -->
  <template x-if="['Mudir', 'Admin'].includes(user?.Role)">
    <button
      type="button"
      @click="currentTab = 'settings'; loadSettings()"
      :class="currentTab === 'settings' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
      class="relative flex flex-col items-center gap-1 transition-all duration-300"
      aria-label="Pengaturan"
      :aria-current="currentTab === 'settings' ? 'page' : false"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
        ></path>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
        ></path>
      </svg>
      <span class="text-[10px] font-bold">Setting</span>
    </button>
  </template>

  <!-- Pulang Bulanan Tab - Visible to all users including Wali -->
  <button
    type="button"
    @click="currentTab = 'pulang_bulanan'; loadPulangBulanan()"
    :class="currentTab === 'pulang_bulanan' ? 'nav-active' : 'text-gray-400 hover:text-gray-600'"
    class="relative flex flex-col items-center gap-1 transition-all duration-300"
    aria-label="Pulang Bulanan"
    :aria-current="currentTab === 'pulang_bulanan' ? 'page' : false"
  >
    <svg
      class="w-6 h-6"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
      ></path>
    </svg>
    <span class="text-[10px] font-bold">Pulang</span>
  </button>
</nav>
