<!-- Modal Detail Laporan -->
<!-- CONTENT: LAPORAN -->
<div x-show="studentDetailTab === 'laporan'" class="space-y-6">
  <div class="max-w-2xl mx-auto space-y-6">
    <div class="bento-card p-8 bg-white shadow-sm border-2 border-[#FAD4C0]/30">
      <div class="text-center mb-6">
        <div
          class="w-16 h-16 bg-[#FAD4C0] rounded-full flex items-center justify-center mx-auto mb-4"
        >
          <svg
            class="w-8 h-8 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            ></path>
          </svg>
        </div>
        <h4 class="text-xl font-bold">Generate Laporan Digital</h4>
        <p class="text-gray-500 text-sm">
          Buat laporan PDF otomatis untuk dikirim ke orang tua
        </p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1"
            >Catatan Khusus Ustadz (Opsional)</label
          >
          <textarea
            x-model="teacherNote"
            rows="4"
            class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-[#FAD4C0] outline-none"
            placeholder="Contoh: Ananda sangat rajin bulan ini..."
          ></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <button
            @click="generatePDF"
            :disabled="loadingReport"
            class="flex items-center justify-center gap-2 py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-black transition-all disabled:opacity-50"
          >
            <span x-show="!loadingReport">⬇️ Download PDF</span>
            <span x-show="loadingReport">Sedang Memproses...</span>
          </button>
          <button
            @click="sendToWA"
            class="flex items-center justify-center gap-2 py-3 bg-[#25D366] text-white rounded-xl font-bold hover:shadow-lg transition-all"
          >
            <span>💬 Kirim via WhatsApp</span>
          </button>
        </div>

        <div class="pt-4 border-t">
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1"
            >Kirim via Email</label
          >
          <div class="flex gap-2">
            <input
              type="email"
              x-model="parentEmail"
              placeholder="email@orangtua.com"
              class="flex-1 px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-[#FAD4C0]"
            />
            <button
              @click="sendToEmail"
              :disabled="!parentEmail || loadingEmail"
              class="px-4 py-2 bg-[#80A1C1] text-white rounded-xl font-bold disabled:opacity-50"
            >
              <span x-show="!loadingEmail">Kirim</span>
              <span x-show="loadingEmail">...</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
